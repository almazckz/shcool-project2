<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Помощник 7 Класс</title>
  <style>
    * { box-sizing: border-box; }
    body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: white; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 15px; }
    .container { background: #1e293b; padding: 25px; border-radius: 20px; width: 100%; max-width: 500px; box-shadow: 0 25px 50px rgba(0,0,0,0.5); border: 1px solid #334155; }
    h1 { text-align: center; color: #60a5fa; font-size: 22px; margin-bottom: 20px; }
    input, textarea { width: 100%; background: #0f172a; border: 1px solid #334155; color: #60a5fa; padding: 12px; border-radius: 10px; margin-bottom: 15px; outline: none; font-size: 14px; }
    textarea { height: 120px; color: white; background: #1e293b; border: 1px solid #475569; resize: none; }
    .btn { width: 100%; padding: 14px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; transition: 0.2s; background: #60a5fa; color: #0f172a; font-size: 16px; }
    .btn:hover { background: #93c5fd; transform: scale(0.98); }
    #output { background: #020617; padding: 15px; border-radius: 12px; border: 1px solid #334155; margin-top: 15px; min-height: 80px; white-space: pre-wrap; font-size: 15px; line-height: 1.5; }
    .loader { color: #fbbf24; font-size: 14px; display: none; text-align: center; margin-bottom: 10px; font-style: italic; }
  </style>
</head>
<body>

<div class="container">
  <h1>🚀 AI Помощник 7 Класс</h1>
  
  <input type="password" id="apiKey" placeholder="Вставь API-ключ (AIza...)">
  <textarea id="userInput" placeholder="Напиши задачу по физике, геометрии или вопрос..."></textarea>
  
  <div id="loader" class="loader">Связываюсь с нейросетью...</div>
  <button onclick="askGemini()" class="btn">✨ Спросить нейросеть</button>
  
  <div id="output">Ответ появится здесь...</div>
</div>

<script>
  async function askGemini() {
    const keyField = document.getElementById('apiKey');
    const inputField = document.getElementById('userInput');
    const output = document.getElementById('output');
    const loader = document.getElementById('loader');

    const key = keyField.value.trim();
    const text = inputField.value.trim();

    if (!key || !text) {
        alert("Заполни ключ и напиши вопрос!");
        return;
    }

    loader.style.display = 'block';
    output.style.opacity = '0.5';

    try {
      // ИСПОЛЬЗУЕМ СТАБИЛЬНУЮ ВЕРСИЮ V1
     const url = `https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key=${key}`;

      const response = await fetch(url, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          contents: [{ parts: [{ text: "Ты — краткий и понятный помощник для ученика 7 класса. Ответь на вопрос: " + text }] }]
        })
      });

      const data = await response.json();

      if (data.error) {
        output.innerText = "❌ Ошибка: " + data.error.message;
      } else if (data.candidates && data.candidates[0].content) {
        output.innerText = data.candidates[0].content.parts[0].text;
      } else {
        output.innerText = "⚠️ Не удалось получить ответ. Проверь ключ.";
      }
    } catch (err) {
      output.innerText = "⚠️ Ошибка связи. Возможно, включен блокировщик или нет интернета.";
      console.error(err);
    } finally {
      loader.style.display = 'none';
      output.style.opacity = '1';
    }
  }
</script>

</body>
</html>
